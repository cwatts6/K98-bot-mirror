name: Quality

on:
  pull_request:
    branches:
      - main

jobs:
  quality:
    env:
        OUR_KINGDOM: "98"
        DISCORD_BOT_TOKEN: "test-token"
        GOOGLE_TIMELINE_ID: "test-timeline-sheet"
        TIMELINE_SHEET_ID: "test-timeline-sheet"
        SQL_SERVER: "test-sql-server"
        SQL_DATABASE: "test-db"
        IMPORT_SQL_USERNAME: "test-user"
        IMPORT_SQL_PASSWORD: "test-password"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Black
        run: python -m black --check .

      - name: Ruff
        run: python -m ruff check .

      - name: Pyright
        run: python -m pyright

      - name: Architecture boundaries
        run: python scripts/validate_architecture_boundaries.py

      - name: Deferred optimisations
        run: python scripts/validate_deferred_items.py

      - name: Tests
        run: python -m pytest -q tests

      - name: Smoke imports
        run: python scripts/smoke_imports.py

      - name: Command registration
        run: python scripts/validate_command_registration.py
