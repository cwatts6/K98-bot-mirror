name: Phase 5G PR-triggered documentation finalizer

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - .github/workflows/phase5g-pr-trigger.yml

permissions:
  contents: write

jobs:
  finalize-docs:
    if: github.head_ref == 'codex/phase-5g-account-data-export-consolidation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/phase-5g-account-data-export-consolidation
          fetch-depth: 0
      - name: Execute final documentation script
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/phase5g-finalize-docs.yml').read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n      - name: Commit final documentation set"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          exec(textwrap.dedent(source[start:end]), {})
          PY
      - name: Commit final documentation set
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "docs: finalize GovernorOS Phase 5G preparation"
          git push origin HEAD:codex/phase-5g-account-data-export-consolidation
