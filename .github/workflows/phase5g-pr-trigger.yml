name: Phase 5G PR-triggered documentation update

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - .github/workflows/phase5g-pr-trigger.yml

permissions:
  contents: write

jobs:
  update-docs:
    if: github.head_ref == 'codex/phase-5g-account-data-export-consolidation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/phase-5g-account-data-export-consolidation
          fetch-depth: 0
      - name: Apply embedded updater
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import re
          import subprocess
          import traceback
          import zlib

          workflow = Path('.github/workflows/phase5g-update-docs.yml').read_text(encoding='utf-8')
          match = re.search(r"base64\.b64decode\('([^']+)'\)", workflow)
          if match is None:
              raise SystemExit('embedded updater payload not found')
          try:
              exec(zlib.decompress(base64.b64decode(match.group(1))))
          except Exception:
              diagnostic = traceback.format_exc()
              subprocess.run(['git', 'reset', '--hard', 'HEAD'], check=True)
              Path('phase5g_update_error.txt').write_text(diagnostic, encoding='utf-8')
          else:
              Path('.github/workflows/phase5g-update-docs.yml').unlink(missing_ok=True)
              Path('.github/workflows/phase5g-pr-trigger.yml').unlink(missing_ok=True)
              Path('phase5g_update_error.txt').unlink(missing_ok=True)
          PY
      - name: Commit documentation update or diagnostic
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "docs: prepare GovernorOS Phase 5G account data exports"
          git push origin HEAD:codex/phase-5g-account-data-export-consolidation
